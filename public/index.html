            fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    if (!file.type.match(/image.*/)) {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (readerEvent) => {
                        const image = new Image();
                        image.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = image.width; let height = image.height;
                            const MAX_SIZE = 1200;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(image, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/webp', 0.8));
                        };
                        image.onerror = reject;
                        image.src = readerEvent.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }
        };

                if (currentUser.role === 'admin') { document.body.classList.add('admin-mode'); document.getElementById('headerUserBadge').textContent = '愿由ъ옄'; document.getElementById('headerUserBadge').classList.add('admin-badge'); document.getElementById('appTableTitle').textContent = '?꾩껜 ?숈깮 ?좎껌 ?댁뿭 (愿由ъ옄??'; }
                else { document.body.classList.remove('admin-mode'); document.getElementById('headerUserBadge').textContent = '?숈깮'; document.getElementById('headerUserBadge').classList.remove('admin-badge'); document.getElementById('appTableTitle').textContent = '?섏쓽 ?좎껌 ?댁뿭 議고쉶'; document.getElementById('appStudentId').value = currentUser.student_id || currentUser.user_id; document.getElementById('appName').value = currentUser.name; }
                document.getElementById('headerUserName').textContent = currentUser.name + '??;
                showLoading();
                try { await refreshDataAndUI(); } catch(e) {}
                hideLoading();
            }
        };
        window.onclick = e => { if (e.target.classList.contains('modal-overlay')) e.target.style.display = 'none'; };
